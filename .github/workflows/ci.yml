name: CI

# The release workflow is manual (workflow_dispatch only), so without this every
# push and pull request would go unverified and main could sit broken for a whole
# dev cycle. This is the gate that runs the suite (with the race detector) on every
# change.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: gofmt
        run: make fmt-check
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: adversary
        run: make adversary
      # -race guards the event.Logger mutex and the portal feed broadcaster; -count=1
      # stops a cached pass from hiding a newly-flaky test; -timeout caps a hung
      # tarpit goroutine instead of letting it wedge the runner.
      - name: test
        timeout-minutes: 10
        run: go test -race -count=1 -timeout=300s ./...
